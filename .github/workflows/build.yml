name: build

on:
  push:
    branches: [main]
    tags: ['**']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Compute which targets actually need rebuilding.
  #   - main pushes: path-based filter against the previous commit (incremental).
  #   - tag pushes:  always build all targets (a tag is a release snapshot, and
  #     the paths-filter would produce an empty diff when the tag points at an
  #     existing main commit — leaving the deploy with nothing to publish).
  changes:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.compute.outputs.targets }}
      any: ${{ steps.compute.outputs.any }}
    steps:
      - uses: actions/checkout@v4

      - name: Reject drafting toggles in thesis.tex
        run: |
          fail=0
          if grep -nE '^[[:space:]]*\\includeonly' thesis.tex; then
            echo "::error file=thesis.tex::thesis.tex has an uncommented \\includeonly (see line above)."
            fail=1
          fi
          if grep -nE '^[[:space:]]*\\documentclass\[[^]]*\bdraft\b[^]]*\]' thesis.tex; then
            echo "::error file=thesis.tex::thesis.tex has 'draft' in \\documentclass options (see line above)."
            fail=1
          fi
          exit $fail

      - id: filter
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: dorny/paths-filter@v3
        with:
          filters: |
            '2302':
              - 'papers/2302/**'
              - 'papers/stand-alone-paper.tex'
              - 'thesis-style.sty'
              - 'papers-bibliography.bib'
              - 'papers-dependencies.tex'
              - 'papers-macros.tex'
              - 'latexmkrc'
              - '.github/workflows/build.yml'
            '2305':
              - 'papers/2305/**'
              - 'papers/stand-alone-paper.tex'
              - 'thesis-style.sty'
              - 'papers-bibliography.bib'
              - 'papers-dependencies.tex'
              - 'papers-macros.tex'
              - 'latexmkrc'
              - '.github/workflows/build.yml'
            '2402':
              - 'papers/2402/**'
              - 'papers/stand-alone-paper.tex'
              - 'thesis-style.sty'
              - 'papers-bibliography.bib'
              - 'papers-dependencies.tex'
              - 'papers-macros.tex'
              - 'latexmkrc'
              - '.github/workflows/build.yml'
            '2405':
              - 'papers/2405/**'
              - 'papers/stand-alone-paper.tex'
              - 'thesis-style.sty'
              - 'papers-bibliography.bib'
              - 'papers-dependencies.tex'
              - 'papers-macros.tex'
              - 'latexmkrc'
              - '.github/workflows/build.yml'
            '2406':
              - 'papers/2406/**'
              - 'papers/stand-alone-paper.tex'
              - 'thesis-style.sty'
              - 'papers-bibliography.bib'
              - 'papers-dependencies.tex'
              - 'papers-macros.tex'
              - 'latexmkrc'
              - '.github/workflows/build.yml'
            '2506':
              - 'papers/2506/**'
              - 'papers/stand-alone-paper.tex'
              - 'thesis-style.sty'
              - 'papers-bibliography.bib'
              - 'papers-dependencies.tex'
              - 'papers-macros.tex'
              - 'latexmkrc'
              - '.github/workflows/build.yml'
            '2602':
              - 'papers/2602/**'
              - 'papers/stand-alone-paper.tex'
              - 'thesis-style.sty'
              - 'papers-bibliography.bib'
              - 'papers-dependencies.tex'
              - 'papers-macros.tex'
              - 'latexmkrc'
              - '.github/workflows/build.yml'
            '2605':
              - 'papers/2605/**'
              - 'papers/stand-alone-paper.tex'
              - 'thesis-style.sty'
              - 'papers-bibliography.bib'
              - 'papers-dependencies.tex'
              - 'papers-macros.tex'
              - 'latexmkrc'
              - '.github/workflows/build.yml'
            'thesis':
              - 'thesis.tex'
              - 'thesis-style.sty'
              - 'chapters/**'
              - 'front-matter/**'
              - 'papers/**'
              - 'papers-bibliography.bib'
              - 'papers-dependencies.tex'
              - 'papers-macros.tex'
              - 'latexmkrc'
              - '.github/workflows/build.yml'
            # Printable variant: same sources as 'thesis' plus its own root.
            'thesis-print':
              - 'thesis.tex'
              - 'thesis-print.tex'
              - 'thesis-style.sty'
              - 'chapters/**'
              - 'front-matter/**'
              - 'papers/**'
              - 'papers-bibliography.bib'
              - 'papers-dependencies.tex'
              - 'papers-macros.tex'
              - 'latexmkrc'
              - '.github/workflows/build.yml'

      - id: compute
        run: |
          if [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            TARGETS='["2302","2305","2402","2405","2406","2506","2602","2605","thesis","thesis-print"]'
            echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
          else
            TARGETS='${{ steps.filter.outputs.changes }}'
            echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"
            if [ "$TARGETS" = "[]" ] || [ -z "$TARGETS" ]; then
              echo "any=false" >> "$GITHUB_OUTPUT"
            else
              echo "any=true" >> "$GITHUB_OUTPUT"
            fi
          fi

  build:
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.changes.outputs.targets) }}
    steps:
      - uses: actions/checkout@v4

      - id: params
        name: Compute build params
        run: |
          if [ "${{ matrix.target }}" = "thesis" ]; then
            echo "root=thesis.tex" >> "$GITHUB_OUTPUT"
            echo "args=-pdf" >> "$GITHUB_OUTPUT"
            echo "pdf=build/thesis.pdf" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.target }}" = "thesis-print" ]; then
            # Its own -outdir: \include writes chapters/foo.aux, named after the
            # included file rather than the jobname, so a shared build/ would let
            # the two thesis builds clobber each other's aux files.
            echo "root=thesis-print.tex" >> "$GITHUB_OUTPUT"
            echo "args=-pdflua -outdir=build/print" >> "$GITHUB_OUTPUT"
            echo "pdf=build/print/thesis-print.pdf" >> "$GITHUB_OUTPUT"
          else
            echo "root=papers/stand-alone-paper.tex" >> "$GITHUB_OUTPUT"
            echo "args=-pdf -jobname=${{ matrix.target }} -outdir=build/${{ matrix.target }}" >> "$GITHUB_OUTPUT"
            echo "pdf=build/${{ matrix.target }}/${{ matrix.target }}.pdf" >> "$GITHUB_OUTPUT"
          fi

      - name: Compile ${{ matrix.target }}
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ steps.params.outputs.root }}
          latexmk_use_lualatex: true
          latexmk_shell_escape: false
          args: ${{ steps.params.outputs.args }}
          # Pin to match the local toolchain (TL2023). Bump in lockstep with local upgrades.
          docker_image: texlive/texlive:TL2023-historic

      - name: Upload ${{ matrix.target }} PDF
        uses: actions/upload-artifact@v4
        with:
          name: pdf-${{ matrix.target }}
          path: ${{ steps.params.outputs.pdf }}
          if-no-files-found: error
          retention-days: 30

  deploy:
    # Run if build either succeeded or was skipped (no targets to rebuild).
    # `needs.build.result` is 'success' / 'skipped' / 'failure' / 'cancelled'.
    needs: [changes, build]
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/') &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      needs.changes.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download newly-built PDFs
        if: needs.build.result == 'success'
        uses: actions/download-artifact@v4
        with:
          path: site
          pattern: pdf-*
          merge-multiple: true

      - name: Carry over unchanged PDFs from the live Pages site
        # For every target not rebuilt this run, fetch its currently-deployed
        # PDF and keep it. The published page is the source of truth for
        # "the last good version of paper X". Missing PDFs (never deployed)
        # produce a warning but don't fail the deploy.
        run: |
          mkdir -p site
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          SITE_URL="https://${{ github.repository_owner }}.github.io/$REPO_NAME"
          missing=()
          for paper in 2302 2305 2402 2405 2406 2506 2602 2605 thesis thesis-print; do
            if [ -f "site/$paper.pdf" ]; then
              echo "$paper.pdf: built this run"
            else
              if curl -fsSL "$SITE_URL/$paper.pdf" -o "site/$paper.pdf"; then
                echo "$paper.pdf: carried over from $SITE_URL"
              else
                rm -f "site/$paper.pdf"
                missing+=("$paper")
                echo "$paper.pdf: WARNING — not available from previous deploy"
              fi
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning::Deploy missing PDFs: ${missing[*]} (never built or not yet published)"
          fi

      - name: Generate index.html
        run: |
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <meta charset="utf-8">
          <title>Luca Arnaboldi — PhD Thesis Drafts</title>
          <style>
            body { font-family: system-ui, sans-serif; max-width: 40em; margin: 3em auto; padding: 0 1em; line-height: 1.5; }
            h1 { font-size: 1.4em; }
            ul { padding-left: 1.2em; }
            li { margin: .4em 0; }
            .meta { color: #666; font-size: .9em; }
            .alt { color: #666; font-size: .85em; }
          </style>
          <h1>Luca Arnaboldi — PhD Thesis Drafts</h1>
          <ul>
            <li><a href="thesis.pdf">Full thesis (draft)</a><br>
                <span class="alt"><a href="thesis-print.pdf">printable version</a> — black links, URLs spelled out</span></li>
            <li><a href="2302.pdf">Paper 2302</a></li>
            <li><a href="2305.pdf">Paper 2305</a></li>
            <li><a href="2402.pdf">Paper 2402</a></li>
            <li><a href="2405.pdf">Paper 2405</a></li>
            <li><a href="2406.pdf">Paper 2406</a></li>
            <li><a href="2506.pdf">Paper 2506</a></li>
            <li><a href="2602.pdf">Paper 2602</a></li>
            <li><a href="2605.pdf">Paper 2605</a></li>
          </ul>
          <p class="meta">Built from tag <code>${{ github.ref_name }}</code> (commit <code>${{ github.sha }}</code>).</p>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
